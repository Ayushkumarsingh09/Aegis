server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    location /api/ { proxy_pass http://quant-api:8090; }
    location /health { proxy_pass http://quant-api:8090; }
    location /metrics { proxy_pass http://quant-api:8090; }
}
