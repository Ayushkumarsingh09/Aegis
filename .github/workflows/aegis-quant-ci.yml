name: Aegis Quant CI

on:
  push:
    branches: [main, master]
    paths:
      - 'aegis-quant/**'
      - 'execution/**'
      - 'options/**'
      - 'market-maker/**'
      - 'analytics/**'
      - 'scripts/install-platform.py'
      - '.github/workflows/aegis-quant-ci.yml'
  pull_request:
    branches: [main, master]

jobs:
  platform-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install platform packages
        run: python scripts/install-platform.py
      - name: Test execution
        run: pytest execution/tests/ -v
      - name: Test options
        run: pytest options/tests/ -v
      - name: Test market-maker
        run: pytest market-maker/tests/ -v
      - name: Test analytics
        run: pytest analytics/tests/ -v

  quant-test:
    runs-on: ubuntu-latest
    needs: platform-test
    defaults:
      run:
        working-directory: aegis-quant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          cd ..
          python scripts/install-platform.py
      - name: Generate sample data
        run: python scripts/generate_sample_data.py
      - name: Seed DuckDB
        run: |
          python -c "
          from aegis_quant.data.engine import MarketDataEngine
          from aegis_quant.data.connectors import CSVConnector
          e = MarketDataEngine()
          e.ingest(CSVConnector('data/sample'), 'BTC-USD')
          e.ingest(CSVConnector('data/sample'), 'ETH-USD')
          "
      - name: Test
        run: pytest tests/ -v

  quant-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aegis-quant/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install && npm run build
